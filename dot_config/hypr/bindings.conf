$terminal = uwsm app -- kitty
$terminal_fish = uwsm app -- kitty -o shell=fish
# $menu = rofi -show drun -run-command "uwsm app -- {cmd}"
$menu = rofi -show combi -run-command "uwsm app -- {cmd}"
$menuemoji = rofimoji
$menubin = rofi -show run -run-command "uwsm app -- {cmd}"
$menufiles = rofi -show filebrowser -run-command "uwsm app -- {cmd}"

####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier

bindle =, XF86AudioRaiseVolume, exec, wpctl set-volume --limit 1.5 @DEFAULT_SINK@ 5%+
bindle =, XF86AudioLowerVolume, exec, wpctl set-volume --limit 1.5 @DEFAULT_SINK@ 5%-
bindle =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindle =, XF86MonBrightnessUp, exec, xbacklight -inc 5
bindle =, XF86MonBrightnessDown, exec, xbacklight -dec 5
bindle =, Print, exec, grim -g "$(slurp)" - | wl-copy
bindl =SHIFT, Print, exec, grim
bindl =ALT, Print, exec, grim -g "$(slurp)" - | swappy -f -

# Applications
bind = $mainMod, RETURN,	exec, $terminal
bind = $mainMod SHIFT, T,	exec, $terminal_fish
bind = $mainMod CTRL, L, exec, uwsm app -- logseq-desktop-electron
bind = $mainMod CTRL, F, exec, uwsm app -- firefox
bind = $mainMod CTRL, J, exec, uwsm app -- flatpak run com.github.iwalton3.jellyfin-media-player
bind = $mainMod CTRL, G, exec, uwsm app -- flatpak run app.grayjay.Grayjay
bind = $mainMod CTRL, Y, exec, uwsm app -- flatpak run com.super_productivity.SuperProductivity
## Menu like applications
bind = $mainMod, 	SPACE, 	exec, $menu
bind = $mainMod SHIFT, 	SPACE, 	exec, $menubin
bind = $mainMod SHIFT, 	F, 	exec, $menufiles
bind = $mainMod, 	PERIOD, 	exec, $menuemoji

# Session
bindl = ,switch:Lid Switch, exec, hyprlock

bind = $mainMod, 	C, 	killactive,
bind = $mainMod, 	V, 	togglefloating,
bind = $mainMod, S, layoutmsg, swapcol r
bind = $mainMod SHIFT, S, layoutmsg, swapcol l
bind = $mainMod, 	F, 	fullscreen,

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, RIGHT, movefocus, r
# bind = $mainMod, K, movefocus, u
# bind = $mainMod, UP, movefocus, u
# bind = $mainMod, J, movefocus, d
# bind = $mainMod, DOWN, movefocus, d
bind = $mainMod, DOWN, layoutmsg, colresize -conf
bind = $mainMod, UP, layoutmsg, colresize +conf
# Move windows
bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, L, movewindow, r
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, J, movewindow, d
bind = $mainMod ALT, LEFT, movewindow, l
bind = $mainMod ALT, RIGHT, movewindow, r
bind = $mainMod ALT, UP, movewindow, u
bind = $mainMod ALT, DOWN, movewindow, d

bind = $mainMod, TAB, cyclenext,
bind = $mainMod SHIFT, TAB, cyclenext, prev

bind = $mainMod, N, workspace, e+1
bind = $mainMod SHIFT, N, movetoworkspace, +1
bind = $mainMod, P, workspace, e-1
bind = $mainMod SHIFT, P, movetoworkspace, -1
bind = $mainMod, 	parenleft, 	workspace, 1
bind = $mainMod SHIFT, 	parenleft, 	movetoworkspace, 1
bind = $mainMod, 	parenright, 	workspace, 2
bind = $mainMod SHIFT, 	parenright, 	movetoworkspace, 2
bind = $mainMod, 	braceright, 	workspace, 3
bind = $mainMod SHIFT, 	braceright, 	movetoworkspace, 3
bind = $mainMod, 	plus, 		workspace, 4
bind = $mainMod SHIFT, 	plus, 		movetoworkspace, 4
bind = $mainMod, 	braceleft, 	workspace, 5
bind = $mainMod SHIFT, 	braceleft, 	movetoworkspace, 5
bind = $mainMod, 	bracketright, 	workspace, 6
bind = $mainMod SHIFT, 	bracketright, 	movetoworkspace, 6
bind = $mainMod, 	bracketleft, 	workspace, 7
bind = $mainMod SHIFT, 	bracketleft, 	movetoworkspace, 7
bind = $mainMod, 	exclam, 	workspace, 8
bind = $mainMod SHIFT, 	exclam, 	movetoworkspace, 8
bind = $mainMod, 	equal, 		workspace, 9
bind = $mainMod SHIFT, 	equal, 		movetoworkspace, 9
bind = $mainMod, 	asterisk, 	workspace, 10
bind = $mainMod SHIFT, 	asterisk, 	movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
